# Location of data files, all path in the YAML file are
# interpreted relative to this path unless they are absolute paths
path: "@MODULE_INSTALL_LOCATION@"
name: bonetag_tibia
urdf_path: urdf/bonetag_tibia.urdf
rsdf_dir: rsdf/bonetag_tibia
fixed: true

convexHulls:
  support_tibia: [support_tibia, "@MODULE_INSTALL_LOCATION@/convex/bonetag_tibia/support_tibia-ch.txt"]
  tibia: [tibia, "@MODULE_INSTALL_LOCATION@/convex/bonetag_tibia/tibia-ch.txt"]

# Default orientation (quaternion) and position of the floating base
default_attitude: [1., 0., 0., 0., 0., 0., 0.]

frames:
  - name: TibiaCalibration
    parent: tibia_base_link
    X_p_f:
      translation: [0.0, 0.095, 0.225] # assuming 2cm height for the calibration tool
      rotation: [1.57, 0, 0]
  # Frame above the surface of the Tibia
  # This should contain the desired offset distance between the tibia and the joint center
  - name: Tibia
    parent: tibia_base_link
    # Plastic base height: 0.065
    # Metal support: 0.01
    X_p_f:
      translation: [0, 0.075, 0.23]
      rotation: [1.57, 0, 0]
