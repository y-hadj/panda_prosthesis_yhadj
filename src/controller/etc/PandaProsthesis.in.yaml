# General constraints, always on
constraints:
- type: contact
- type: kinematics
  robot: panda_femur
  damper: [0.1, 0.01, 0.5]
  velocityPercent: 0.2
- type: kinematics
  robot: panda_tibia
  damper: [0.1, 0.01, 0.5]
  velocityPercent: 0.2
