ObserverPipelines:
  - name: PandaFemur
    observers:
    - type: BodySensor
      config:
        robot: panda_femur
        method: control
    - type: Encoder
      config:
        robot: panda_femur
        position: encoderValues
        #velocity: encoderFiniteDifferences
        #velocity: encoderVelocities
        velocity: control
  - name: PandaTibia
    observers:
    - type: BodySensor
      config:
        robot: panda_tibia
        method: control
        log:
          position: true
          velocity: true
    - type: Encoder
      config:
        robot: panda_tibia
        position: encoderValues
        #velocity: encoderFiniteDifferences
        # velocity: encoderVelocities
        velocity: control # encoderVelocities
        log:
          position: true
          velocity: true

# Initial set of contacts
contacts: []
# Implement some additional text states
states:
  InitialChoice:
    base: Choice
    category: []
    choices:
      - ["Load Saved Calibration", "LoadSavedCalibration"]
      - ["Start from current configuration", "StartFromCurrent"]

Plugins: [BoneTagSerialPlugin]

transitions:
  #- [ChooseMode, Simulation, Simulation, Auto]
  #- [ChooseMode, Real, Real, Auto]
  - [Simulation, OK, Simulation, Strict]

# Initial state
#init: ChooseMode
init: Simulation
# Store the location of configuration files
CALIB_DIR_INIT: "@CALIB_DIR_INIT@"
