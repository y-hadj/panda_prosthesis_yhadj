---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: false
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false

# TODO: Change this when changing robot
# ControllerName: bonetag_ur10
ControllerName: bonetag_panda

TrajectoryLoaders:
  BoneTag:
    directory: "@TRAJECTORY_DIR@"

trajectory_dir: "@TRAJECTORY_DIR@/bonetag"
offsets:
  femur:
    translation: [0, 0, 0.0]
  tibia:
    translation: [0, 0, 0.01]
# Additional robots to load
robots:
  panda_femur:
    init_pos:
      translation: [0,0,0]
    CollisionBehavior:
      # Changes the collision behavior, see franka::Robot documentation for details
      # Set common torque and force boundaries for acceleration/deceleration and constant velocity movement phases.
      #
      # Forces or torques between lower and upper threshold are shown as contacts in the RobotState. Forces or torques above the upper threshold are registered as collision and cause the robot to stop moving.
      #
      # Parameters:
      # - lower_torque_thresholds	Contact torque thresholds for each joint in [Nm].
      # - upper_torque_thresholds	Collision torque thresholds for each joint in [Nm].
      # - lower_force_thresholds	Contact force thresholds for (x,y,z,R,P,Y) in [N].
      # - upper_force_thresholds	Collision force threshnolds for (x,y,z,R,P,Y) in [N].
      lower_torque_thresholds: [-87, -87, -87, -87, -11, -11, -11]
      upper_torque_thresholds: [87, 87, 87, 87, 11, 11, 11]
      lower_force_thresholds: [-100, -100, -100, -100, -100, -100]
      upper_force_thresholds: [100, 100, 100, 100, 100, 100]
  panda_tibia:
    module: Panda7LIRMMDefault::BoneTag::Tibia
    # module: Panda7LIRMMDefault::TAA::Talar
    # module: UR10::BoneTag::Tibia
    CollisionBehavior:
      # See panda_femur for details
      lower_torque_thresholds: [-87, -87, -87, -87, -11, -11, -11]
      upper_torque_thresholds: [87, 87, 87, 87, 11, 11, 11]
      lower_force_thresholds: [-100, -100, -100, -100, -100, -100]
      upper_force_thresholds: [100, 100, 100, 100, 100, 100]
# General constraints, always on
constraints:
- type: contact
- type: kinematics
  robot: panda_femur
  damper: [0.1, 0.01, 0.5]
# Collision constraint
collisions:
- type: collision
  r1: panda_tibia
  r2: panda_tibia
  useMinimal: true
- type: collision
  r1: panda_femur
  r2: panda_femur
  useMinimal: true

ObserverPipelines:
  - name: PandaFemur
    observers:
    - type: BodySensor
      config:
        robot: panda_femur
        method: control
    - type: Encoder
      config:
        robot: panda_femur
        position: encoderValues
        #velocity: encoderFiniteDifferences
        #velocity: encoderVelocities
        velocity: control
  - name: PandaTibia
    observers:
    - type: BodySensor
      config:
        robot: panda_tibia
        method: control
        log:
          position: true
          velocity: true
    - type: Encoder
      config:
        robot: panda_tibia
        position: encoderValues
        #velocity: encoderFiniteDifferences
        # velocity: encoderVelocities
        velocity: control # encoderVelocities
        log:
          position: true
          velocity: true

# Initial set of contacts
contacts: []
# Implement some additional text states
states:
  InitialChoice:
    base: Choice
    category: []
    choices:
      - ["Load Saved Calibration", "LoadSavedCalibration"]
      - ["Start from current configuration", "StartFromCurrent"]

Plugins: [BoneTagSerialPlugin]

transitions:
  - [ChooseMode, Simulation, Simulation, Auto]
  - [ChooseMode, Real, Real, Auto]

# Initial state
init: ChooseMode
# Store the location of configuration files
CALIB_DIR_INIT: "@CALIB_DIR_INIT@"
