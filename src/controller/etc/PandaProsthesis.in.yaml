---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: false
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false

# TODO: Change this when changing robot
ControllerName: bonetag_ur10
# ControllerName: bonetag_panda

TrajectoryLoaders:
  BoneTag:
    directory: "@TRAJECTORY_DIR@"

trajectory_dir: "@TRAJECTORY_DIR@/bonetag"
results_dir: "@RESULTS_DIR@/bonetag"
offsets:
  femur:
    translation: [0, 0, 0.0]
  tibia:
    translation: [0, 0, 0.02]
# Additional robots to load
robots:
  panda_femur:
    init_pos:
      translation: [0,0,0]
    frames:
      - name: FemurCalibration
        parent: support_femur
        X_p_f:
          translation: [0, 0, -0.215]
          rotation: [3.14, 0, 0.0]
      # Frame above the surface of the Femur
      # This should contain the desired offset distance between the femur and the joint center
      - name: Femur
        parent: support_femur
        # plastic support 0.215
        # metal prosthesis 0.1
        X_p_f:
          translation: [0, 0, -0.225]
          rotation: [3.14, 0, 0]
  panda_tibia:
    # module: PandaProsthesis::PandaDefault::BoneTag::Tibia
    module: PandaProsthesis::UR10::BoneTag::Tibia
    frames:
      - name: TibiaCalibration
        parent: tibia_base_link
        X_p_f:
          translation: [0, 0.095, 0.225] # assuming 2cm height for the calibration tool
          rotation: [1.57, 0, 0]
      # Frame above the surface of the Tibia
      # This should contain the desired offset distance between the tibia and the joint center
      - name: Tibia
        parent: tibia_base_link
        # Plastic base height: 0.065
        # Metal support: 0.01
        X_p_f:
          translation: [0, 0.075, 0.23]
          rotation: [1.57, 0, 0]
# General constraints, always on
constraints:
- type: contact
- type: kinematics
  robot: panda_femur
  damper: [0.1, 0.01, 0.5]
# Collision constraint
collisions:
- type: collision
  robot: panda_tibia
  useMinimal: true

ObserverPipelines:
  - name: PandaFemur
    observers:
    - type: BodySensor
      config:
        robot: panda_femur
        method: control
    - type: Encoder
      config:
        robot: panda_femur
        position: control #encoderValues
        velocity: control #encoderFiniteDifferences
  - name: PandaTibia
    observers:
    - type: BodySensor
      config:
        robot: panda_tibia
        method: control
    - type: Encoder
      config:
        robot: panda_tibia
        position: control #encoderValues
        velocity: control #encoderFiniteDifferences

# Initial set of contacts
contacts: []
# Implement some additional text states
states:
  InitialChoice:
    base: Choice
    category: []
    choices:
      - ["Load Saved Calibration", "LoadSavedCalibration"]
      - ["Start from current configuration", "StartFromCurrent"]

Plugins: [BoneTagSerialPlugin]

transitions:
  - [ChooseMode, Simulation, Simulation, Auto]
  - [ChooseMode, Real, Real, Auto]

# Initial state
init: ChooseMode
# Store the location of configuration files
ETC_DIR: "@CMAKE_CURRENT_SOURCE_DIR@/etc"
